# =============================================================================
# Deploy to QA — runs on PR from dev to qa
# =============================================================================
# Deploys to QA environment for validation before production.
# =============================================================================

name: Deploy to QA

on:
  pull_request:
    branches: [qa]
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read

jobs:
  deploy-qa:
    runs-on: ubuntu-latest
    environment: qa

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ----- AWS Authentication ---------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ----- Backend Build --------------------------------------------------
      - name: Build Backend Docker image
        run: |
          cd backend
          docker build -t commander-backend:qa-${{ github.sha }} .

      # ----- Frontend Build -------------------------------------------------
      - name: Build Frontend Docker image
        run: |
          cd frontend
          docker build -t commander-frontend:qa-${{ github.sha }} .

      - name: Summary
        run: |
          echo "## QA Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** CommanderOS" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend Image:** qa-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Image:** qa-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ QA deployment images ready" >> $GITHUB_STEP_SUMMARY
