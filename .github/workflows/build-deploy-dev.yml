# =============================================================================
# Build & Deploy to Dev — runs automatically on merge to dev
# =============================================================================
# Builds Docker images for Backend and Frontend, tags with commit SHA, 
# and prepares for pushing to ECR.
# =============================================================================

name: Build & Deploy to Dev

on:
  push:
    branches: [dev]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      IMAGE_TAG: sha-${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ----- AWS OIDC Authentication ----------------------------------------
      # TODO: Configure AWS OIDC and uncomment
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     role-to-assume: ${{ secrets.AWS_DEV_DEPLOY_ROLE_ARN }}
      #     aws-region: ${{ vars.AWS_REGION }}

      # - name: Login to Amazon ECR
      #   uses: aws-actions/amazon-ecr-login@v2

      # ----- Backend Build --------------------------------------------------
      - name: Build Backend Docker image
        run: |
          cd backend
          docker build -t commander-backend:${{ env.IMAGE_TAG }} .

      # - name: Tag and push Backend to ECR
      #   run: |
      #     docker tag commander-backend:${{ env.IMAGE_TAG }} \
      #       ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/dev/commander-backend:${{ env.IMAGE_TAG }}
      #     docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/dev/commander-backend:${{ env.IMAGE_TAG }}

      # ----- Frontend Build -------------------------------------------------
      - name: Build Frontend Docker image
        run: |
          cd frontend
          docker build -t commander-frontend:${{ env.IMAGE_TAG }} .

      # - name: Tag and push Frontend to ECR
      #   run: |
      #     docker tag commander-frontend:${{ env.IMAGE_TAG }} \
      #       ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/dev/commander-frontend:${{ env.IMAGE_TAG }}
      #     docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/dev/commander-frontend:${{ env.IMAGE_TAG }}

      - name: Summary
        run: |
          echo "## Dev Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** CommanderOS" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend Image Tag:** ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Image Tag:** ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Images built successfully" >> $GITHUB_STEP_SUMMARY
