name: Deploy to Baseline (Production)

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ----- 1. Authentication ------------------------------------------------
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::547456401969:role/px-deploy-commander
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        id: login-ecr

      # ----- 2. Build & Push --------------------------------------------------
      - name: Build, Tag, and Push (Backend)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/commander-backend:prod-latest ./backend
          docker push $ECR_REGISTRY/commander-backend:prod-latest

      - name: Build, Tag, and Push (Frontend)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/commander-frontend:prod-latest ./frontend
          docker push $ECR_REGISTRY/commander-frontend:prod-latest

      # ----- 3. Update ECS ----------------------------------------------------
      - name: Force ECS Redeploy
        run: |
          aws ecs update-service --cluster px-apps-cluster --service commander-backend-prod --force-new-deployment
          aws ecs update-service --cluster px-apps-cluster --service commander-frontend-prod --force-new-deployment

      - name: Summary
        run: |
          echo "## Baseline Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ **CommanderOS** updated on shared platform." >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://commander.pxltd.ca" >> $GITHUB_STEP_SUMMARY
