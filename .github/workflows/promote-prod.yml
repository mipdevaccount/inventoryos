# =============================================================================
# Promote to Production — runs on PR from qa to main
# =============================================================================
# Deploys to production after QA validation. 
# Requires Environment approval in GitHub.
# =============================================================================

name: Promote to Production

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  id-token: write
  contents: read

jobs:
  promote-prod:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ----- AWS OIDC Authentication ----------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PROD_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ----- Backend Build & Push ------------------------------------------
      - name: Build Backend Docker image
        run: |
          cd backend
          docker build -t commander-backend:prod-${{ github.sha }} .

      - name: Tag and push Backend to ECR
        run: |
          docker tag commander-backend:prod-${{ github.sha }} \
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/prod/commander-backend:prod-${{ github.sha }}
          docker tag commander-backend:prod-${{ github.sha }} \
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/prod/commander-backend:latest
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/prod/commander-backend:prod-${{ github.sha }}
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/prod/commander-backend:latest

      # ----- Frontend Build & Push ------------------------------------------
      - name: Build Frontend Docker image
        run: |
          cd frontend
          docker build -t commander-frontend:prod-${{ github.sha }} .

      - name: Tag and push Frontend to ECR
        run: |
          docker tag commander-frontend:prod-${{ github.sha }} \
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/prod/commander-frontend:prod-${{ github.sha }}
          docker tag commander-frontend:prod-${{ github.sha }} \
            ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/prod/commander-frontend:latest
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/prod/commander-frontend:prod-${{ github.sha }}
          docker push ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/prod/commander-frontend:latest


      # ----- ECS Deployment - Backend ---------------------------------------
      - name: Render Backend Task Definition
        id: render-backend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: backend/task-definition.json
          container-name: backend
          image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/prod/commander-backend:prod-${{ github.sha }}

      - name: Deploy Backend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-backend.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE_BACKEND_PROD }}
          cluster: ${{ vars.ECS_CLUSTER_PROD }}
          wait-for-service-stability: true

      # ----- ECS Deployment - Frontend --------------------------------------
      - name: Render Frontend Task Definition
        id: render-frontend
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: frontend/task-definition.json
          container-name: frontend
          image: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/prod/commander-frontend:prod-${{ github.sha }}

      - name: Deploy Frontend to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-frontend.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE_FRONTEND_PROD }}
          cluster: ${{ vars.ECS_CLUSTER_PROD }}
          wait-for-service-stability: true

      - name: Summary
        run: |
          echo "## 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Service:** CommanderOS" >> $GITHUB_STEP_SUMMARY
          echo "- **Endpoint:** https://commander.pxltd.ca" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend Image:** prod-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Image:** prod-${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ✅ Production deployment complete" >> $GITHUB_STEP_SUMMARY
