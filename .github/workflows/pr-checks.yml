# =============================================================================
# PR Checks — runs on every pull request to dev
# =============================================================================
# This workflow runs automated quality checks for the Frontend.
# =============================================================================

name: PR Checks

on:
  pull_request:
    branches: [dev]

jobs:
  frontend-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Run build
        run: |
          cd frontend
          npm run build

      - name: Validate Frontend Docker build
        run: |
          cd frontend
          docker build -t commander-frontend:pr-check .

      - name: Structural Validations
        run: |
          if [ ! -f frontend/Dockerfile ]; then
            echo "::error::Missing frontend/Dockerfile"
            exit 1
          fi
          if [ ! -f frontend/package.json ]; then
            echo "::error::Missing frontend/package.json"
            exit 1
          fi
