

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: commander-postgres-prod
    environment:
      POSTGRES_DB: commander_v3
      POSTGRES_USER: commander
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commander"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - commander-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: commander-redis-prod
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - commander-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: commander-backend-prod
    environment:
      DATABASE_URL: postgresql://commander:${POSTGRES_PASSWORD}@postgres:5432/commander_v3
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - commander-network
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: commander-celery-worker-prod
    environment:
      DATABASE_URL: postgresql://commander:${POSTGRES_PASSWORD}@postgres:5432/commander_v3
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - commander-network
    restart: unless-stopped
    command: celery -A celery_config worker --loglevel=info --concurrency=4

  # Celery Beat
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: commander-celery-beat-prod
    environment:
      DATABASE_URL: postgresql://commander:${POSTGRES_PASSWORD}@postgres:5432/commander_v3
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      - postgres
      - redis
    networks:
      - commander-network
    restart: unless-stopped
    command: celery -A celery_config beat --loglevel=info

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: commander-frontend-prod
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - commander-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  commander-network:
    driver: bridge
