

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: commander-postgres
    environment:
      POSTGRES_DB: commander_v3
      POSTGRES_USER: commander
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U commander"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - commander-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: commander-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - commander-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: commander-backend
    environment:
      DATABASE_URL: postgresql://commander:${POSTGRES_PASSWORD:-changeme}@postgres:5432/commander_v3
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - commander-network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: commander-celery-worker
    environment:
      DATABASE_URL: postgresql://commander:${POSTGRES_PASSWORD:-changeme}@postgres:5432/commander_v3
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - commander-network
    command: celery -A celery_config worker --loglevel=info

  # Celery Beat (Scheduler)
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: commander-celery-beat
    environment:
      DATABASE_URL: postgresql://commander:${POSTGRES_PASSWORD:-changeme}@postgres:5432/commander_v3
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
    volumes:
      - ./backend:/app
    depends_on:
      - postgres
      - redis
    networks:
      - commander-network
    command: celery -A celery_config beat --loglevel=info

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: commander-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - commander-network

volumes:
  postgres_data:
  redis_data:
  backend_data:

networks:
  commander-network:
    driver: bridge
